<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pick A Time ⏰</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="stylr.css">

</head>
<body>

<div class="floating-hearts"></div>

<div class="container">

<div class="card">

<img
class="cat-gif"
src="https://media.giphy.com/media/v6aOjy0Qo1fIA/giphy.gif"
alt="Cute Cat">

<h1>What Time Works For You? ⏰💖</h1>

<p class="subtitle">
Let's make this date perfect 🥰
</p>

<div class="form-box">

<label>Select Time</label>

<select id="timeSelect" class="cute-input">

<option value="">Choose Time</option>

<option>10:00 AM</option>
<option>11:00 AM</option>
<option>12:00 PM</option>
<option>1:00 PM</option>
<option>2:00 PM</option>
<option>3:00 PM</option>
<option>4:00 PM</option>
<option>5:00 PM</option>
<option>6:00 PM</option>
<option>7:00 PM</option>
<option>8:00 PM</option>

</select>

<button
class="next-btn"
onclick="goNext()">
Next ➜
</button>

</div>

</div>

</div>

<script>

function goNext(){

const time =
document.getElementById("timeSelect").value;

if(time === ""){
alert("Please select a time ❤️");
return;
}

localStorage.setItem(
"selectedTime",
time
);

window.location.href =
"food.html";

}

function createHeart() {
    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML = "💖";
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.animationDuration = (Math.random() * 3 + 4) + "s";
    document.body.appendChild(heart);
    setTimeout(() => {
        heart.remove();
    }, 7000);
}

setInterval(createHeart, 600);

</script>

</body>
</html>
