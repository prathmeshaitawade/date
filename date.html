<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>You Said Yes ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="stylr.css">
</head>

<body>

<div class="floating-hearts"></div>

<div class="container">

<div class="card">

<img
class="cat-gif"
src="https://media.giphy.com/media/ICOgUNjpvO0PC/giphy.gif"
alt="Happy Cat">

<h1>WAIT... YOU ACTUALLY SAID YES?! 😭💖</h1>

<p class="subtitle">
You just made my day 🥹
</p>

<div class="form-box">

<label>Pick Our Date 📅</label>

<input
type="date"
id="datePicker"
class="cute-input">

<button
class="next-btn"
onclick="goNext()">
Next ➜
</button>

</div>

</div>

</div>

<script>

function goNext(){

const date =
document.getElementById("datePicker").value;

if(!date){
alert("Please select a date ❤️");
return;
}

localStorage.setItem(
"selectedDate",
date
);

window.location.href =
"time.html";

}

function createHeart() {
    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML = "💖";
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.animationDuration = (Math.random() * 3 + 4) + "s";
    document.body.appendChild(heart);
    setTimeout(() => {
        heart.remove();
    }, 7000);
}

setInterval(createHeart, 600);

</script>

</body>
</html>
